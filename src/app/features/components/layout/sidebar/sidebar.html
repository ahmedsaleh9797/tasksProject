<p-drawer [(visible)]="sidebarVisible">

    <ng-template #headless>

        <div class="flex flex-col h-full">


            <div class="flex items-center justify-between px-4 pt-3 shrink-0">

                <span class="font-semibold text-2xl text-primary">

                    Tasks
                </span>

                <p-button (onClick)="sidebarVisible=false" icon="pi pi-times" rounded="true" outlined="true">
                </p-button>

            </div>


            <div class="overflow-y-auto">

                <ul class="list-none p-3 m-0">

                    <li>

                        <div (click)="toggleForm()" pRipple
                            class="p-3 flex items-center justify-between cursor-pointer">

                            <span class="font-medium">
                                Form
                            </span>

                            <i class="pi" [class.pi-chevron-down]="!formOpen" [class.pi-chevron-up]="formOpen">
                            </i>

                        </div>


                        @if(formOpen){

                        <ul class="list-none p-0 m-0">

                            <li>
                                <a pRipple class="flex items-center p-3 rounded-lg cursor-pointer">
                                    <span>Form Array</span>
                                </a>
                            </li>

                            <li>
                                <a pRipple class="flex items-center p-3 rounded-lg cursor-pointer">
                                    <span>Form Child</span>
                                </a>
                            </li>

                            <li>
                                <a pRipple class="flex items-center p-3 rounded-lg cursor-pointer">
                                    <span>Form Disable</span>
                                </a>
                            </li>

                        </ul>

                        }

                    </li>

                </ul>

            </div>



            <div class="overflow-y-auto">

                <ul class="list-none p-3 m-0">

                    <li>

                        <div (click)="toggleTable()" pRipple
                            class="p-3 flex items-center justify-between cursor-pointer">

                            <span class="font-medium">
                                Table
                            </span>

                            <i class="pi" [class.pi-chevron-down]="!tableOpen" [class.pi-chevron-up]="tableOpen">
                            </i>

                        </div>


                        @if(tableOpen){

                        <ul class="list-none p-0 m-0">

                            <li>
                                <a pRipple class="flex items-center p-3 rounded-lg cursor-pointer">
                                    <span>Crud Table</span>
                                </a>
                            </li>

                        </ul>

                        }

                    </li>

                </ul>

            </div>


            <div class="mt-auto">
                <hr class="mb-3 mx-3" />
            </div>

        </div>

    </ng-template>

</p-drawer>


<p-button (onClick)="sidebarVisible=true" icon="pi pi-bars" rounded="true" outlined="true">
</p-button>
