<div
    class="me-7 rounded-3xl min-h-screen bg-linear-to-br from-slate-50 via-white to-red-50 flex items-center justify-center">

    <p-scrollPanel class="w-full h-screen">

        <div class="flex items-center justify-center min-h-screen">

            <div class="text-center px-6">

                <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight text-slate-800 mb-10">
                    Task For
                    <span class="text-red-600">Job</span>
                </h1>

                <div class="relative flex justify-center items-center mb-8">

                    <div class="absolute w-60 h-60 rounded-full bg-red-100 blur-3xl opacity-70"></div>

                    <div
                        class="relative bg-white rounded-4xl shadow-2xl border border-slate-100 p-10 hover:scale-105 transition duration-300">

                        <div class="w-40 h-40 text-red-600 mx-auto flex items-center justify-center">
                            <app-icon name="home" [size]="160" class="block"></app-icon>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </p-scrollPanel>

</div>
